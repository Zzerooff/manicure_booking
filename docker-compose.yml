version: '3.7'
services:
  manicure_natali:
    image: manicure_natali
    volumes:
      - .:/manicure_natali
    build:
      context: .
    ports:
      - "8000:8000"
    command: ['/manicure_natali/docker/app.sh']
    env_file:
      - .env-non-dev
    depends_on:
      - db
      - redis

  db: # this name in .env-non-dev
    image: postgres:15
    container_name: manicure_postgres
    env_file:
      - .env-non-dev
    ports:
      - 5432:5432

  redis:
    image: redis:7
    container_name: manicure_redis
    ports:
      - 6379:6379

  celery:
    image: manicure_natali
    build: .
    container_name: manicure_celery
    env_file:
      - .env-non-dev
    command: ['/manicure_natali/docker/celery.sh', 'celery']
    depends_on:
      - redis

  flower:
    image: manicure_natali
    build: .
    container_name: manicure_flower
    ports:
      - 5555:5555
    env_file:
      - .env-non-dev
    command: ['/manicure_natali/docker/celery.sh', 'flower']
    depends_on:
      - redis

