services:
  web:
    build:
      context: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: ["./docker/app.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-manicure_app}"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    env_file:
      - .env
    command: ["./docker/celery.sh", "celery"]
    depends_on:
      - redis

  flower:
    build: .
    ports:
      - "5555:5555"
    env_file:
      - .env
    command: ["./docker/celery.sh", "flower"]
    depends_on:
      - redis

volumes:
  postgres_data: